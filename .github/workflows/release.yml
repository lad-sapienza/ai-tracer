name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed to read annotated tag messages

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Check tag version matches metadata.txt
        run: |
          META_VERSION=$(grep '^version=' plugin/metadata.txt | cut -d= -f2)
          TAG_VERSION=${{ steps.version.outputs.version }}
          if [ "$META_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: metadata.txt version ($META_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Extract tag annotation as release body
        id: tag_body
        run: |
          BODY=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build plugin zip
        run: bash package.sh ${{ steps.version.outputs.version }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: AITracer by LAD v${{ steps.version.outputs.version }}
          body: ${{ steps.tag_body.outputs.body }}
          files: dist/aitracer-${{ steps.version.outputs.version }}.zip
